# Redireciona HTTP → HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name _;

    # ── Certificados SSL ────────────────────────
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # Protocolos e cifras modernas
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ── Root: volume compartilhado do PHP ───────
    # Arquivos servidos diretamente pelo nginx (sem tocar no PHP)
    root  /var/www/public_volume;
    index index.php index.html;

    # Segurança: esconde arquivos ocultos
    location ~ /\. {
        deny all;
    }

    # Assets estáticos: cache agressivo, nginx serve direto
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff2?|ttf|eot|map)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Regra principal do Laravel
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP via FastCGI → container laravel
    location ~ \.php$ {
        include        fastcgi_params;
        fastcgi_pass   laravel:9000;
        fastcgi_index  index.php;
        # SCRIPT_FILENAME aponta para o código no container PHP (não no volume)
        fastcgi_param  SCRIPT_FILENAME /var/www/html/public$fastcgi_script_name;
        fastcgi_param  DOCUMENT_ROOT   /var/www/html/public;
        fastcgi_read_timeout 60;
    }

    # Logs
    access_log /var/log/nginx/cattlerfid_access.log;
    error_log  /var/log/nginx/cattlerfid_error.log;
}
