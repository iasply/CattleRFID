services:

  laravel:
    build: .
    container_name: cattlerfid_app
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    volumes:
      # Volume compartilhado com nginx: assets do public/
      - laravel_public:/var/www/public_volume
      # Persistência do banco SQLite
      - ./database:/var/www/html/database
    networks:
      - cattlerfid

  nginx:
    image: nginx:stable-alpine
    container_name: cattlerfid_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Assets PHP (readonly no nginx)
      - laravel_public:/var/www/public_volume:ro
      # Certs: bind mount local
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - laravel
    networks:
      - cattlerfid

networks:
  cattlerfid:
    driver: bridge

volumes:
  laravel_public:
